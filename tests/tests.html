<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OSA Phenotyper – Test Suite</title>
<style>
  body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 2rem; background: #f8f9fa; }

<body>
<h1>OSA Phenotyper Test Suite</h1>
<div id="results"></div>

<!-- Load app modules (no DOM form needed for unit tests) -->
<script src="../js/config.js"></script>
<script src="../js/validate.js"></script>
<script src="../js/report-shared.js"></script>
<script src="../js/patientReport.js"></script>
<script>
// ── Minimal test framework ──────────────────────────────────────
let passed = 0, failed = 0;
const results = [];

function assert(condition, message) {
  if (condition) {
    passed++;
    results.push({ pass: true, message });
  } else {
    failed++;
    results.push({ pass: false, message });
  }
}

function assertEqual(actual, expected, message) {
  const pass = actual === expected;
  if (!pass) message += ` (got ${JSON.stringify(actual)}, expected ${JSON.stringify(expected)})`;
  assert(pass, message);
}

function group(name) {
  results.push({ group: name });
}

// ── Helpers from app.js (replicated for testing without DOM) ────
function n(v){ if(v===null||v===undefined||v==='') return null; const x=+v; return (Number.isFinite(x)?x:null); }
function ratio(a,b){
  const num = n(a);
  const den = n(b);
  if (num === null || den === null) return null;
  if (den === 0) return num > 0 ? Infinity : null;
  return num / den;
}
function exists(v){ return v!==null && v!==undefined && v!==''; }

const T = OSA_CONFIG.thresholds;

// Simplified confidenceFor for testing (same logic as app.js)
function confidenceFor(tag, ctx){
  const m = ctx.metrics;
  switch(tag){
    case 'High Anatomical Contribution': {
      const neckHigh = m.sex === 'F' ? T.anatomical.neckHigh.female : T.anatomical.neckHigh.male;
      const strong =
        ((m.bmi||0) >= T.anatomical.bmiHigh ? 1 : 0) +
        ((m.neck||0) >= neckHigh ? 1 : 0) +
        ((m.tons||0) >= T.anatomical.tonsils ? 1 : 0) +
        (T.anatomical.ftp.includes(m.mall) ? 1 : 0) +
        ((m.ahi||0) >= T.anatomical.ahiSevere ? 1 : 0);
      if(strong >= 4) return 'High';
      if(strong >= 2) return 'Moderate';
      return 'Low';
    }
    case 'Low Arousal Threshold': {
      const score = m.edwardsArTHScore || 0;
      const maxScore = m.edwardsArTHMaxScore || 0;
      if (score >= T.arousal.scoreLikely && maxScore === 3) return score === 3 ? 'High' : 'Moderate';
      if (score >= T.arousal.scoreLikely && maxScore === 2) return 'Moderate';
      return 'Low';
    }
    case 'High Loop Gain': {
      const lg = m.lgEstimate;
      const supportCount =
        ((m.csr||0) >= T.loopGain.csr ? 1 : 0) +
        ((m.pahic3||0) >= T.loopGain.pahic3 ? 1 : 0) +
        ((m.pahic4||0) >= T.loopGain.pahic4 ? 1 : 0) +
        ((m.cai||0) >= T.loopGain.pahic3 ? 1 : 0);
      if(exists(lg) && lg >= T.loopGain.estimateHigh) return supportCount >= 1 ? 'High' : 'Moderate';
      if(exists(lg) && lg >= T.loopGain.estimateBorderline) return supportCount >= 1 || m.cvd ? 'Moderate' : 'Low';
      if(supportCount >= 2) return m.cvd ? 'High' : 'Moderate';
      if(supportCount >= 1 && m.cvd) return 'Moderate';
      return 'Low';
    }
    case 'Poor Muscle Responsiveness': {
      const remNrem = ratio(m.remAhi, m.nremAhi) ?? 0;
      const nrem = exists(m.nremAhi) ? m.nremAhi : 0;
      if((m.ahi||0) >= T.muscleResponse.ahiHigh && remNrem > T.muscleResponse.remNremRatioHigh && nrem >= T.muscleResponse.nremFloorHigh) return 'High';
      if((m.ahi||0) >= T.muscleResponse.ahiMin && remNrem > T.muscleResponse.remNremRatio && nrem >= T.muscleResponse.nremFloor) return 'Moderate';
      return 'Low';
    }
    case 'Positional OSA': {
      const pr = ratio(m.sup, m.nons) ?? 0;
      if(pr >= T.positional.supNonSupRatioHigh && (m.nons||0) < T.positional.nonSupMaxHigh) return 'High';
      if(pr >= T.positional.supNonSupRatio && (m.nons||0) < T.positional.nonSupMax) return 'Moderate';
      return 'Low';
    }
    case 'REM-Predominant OSA': {
      const rr = ratio(m.remAhi, m.nremAhi) ?? 0;
      if(rr >= T.remPredominant.remNremRatioHigh && (m.nremAhi||0) < T.remPredominant.nremMaxHigh) return 'High';
      if(rr >= T.remPredominant.remNremRatio && (m.nremAhi||0) < T.remPredominant.nremMax) return 'Moderate';
      return 'Low';
    }
    case 'High Hypoxic Burden': {
      const hb = m.hbPH||0, hb90 = m.hb90PH||0, odi = m.odi||0, nad = m.nadir??100, tBelow90 = m.t90||0;
      if(hb >= T.hypoxicBurden.hbPerHourHigh || odi > T.hypoxicBurden.odiSevere || nad < T.hypoxicBurden.nadirSevere || tBelow90 > T.hypoxicBurden.t90Severe || hb90 > T.hypoxicBurden.areaUnder90Severe) return 'High';
      if(hb >= T.hypoxicBurden.hbPerHour || odi >= T.hypoxicBurden.odi || tBelow90 >= T.hypoxicBurden.t90 || hb90 > T.hypoxicBurden.areaUnder90) return 'Moderate';
      return 'Low';
    }
    case 'Nasal-Resistance Contributor': {
      const nose = m.noseScore || 0;
      const hasCT = m.ctSeptum || m.ctTurbs;
      if(nose >= T.nasal.noseSevere || (nose >= T.nasal.noseMild && hasCT)) return 'High';
      if(nose >= T.nasal.noseMild || m.nasalObs || hasCT) return 'Moderate';
      if(nose >= T.nasal.noseBorderline) return 'Low';
      return 'Low';
    }
    case 'Elevated Delta Heart Rate': {
      const dhr = m.dhr || 0;
      if(dhr >= T.deltaHeartRate.dhrHigh) return 'High';
      if(dhr >= T.deltaHeartRate.dhr) return 'Moderate';
      if(dhr >= T.deltaHeartRate.dhrBorderline) return 'Low';
      return 'Low';
    }
    default: return 'Moderate';
  }
}

// ── TESTS ───────────────────────────────────────────────────────

// ── Config integrity ──────────────────────────────────────────
group('Config Integrity');
assert(typeof OSA_CONFIG === 'object', 'OSA_CONFIG exists');
assert(typeof OSA_CONFIG.thresholds === 'object', 'thresholds object exists');
assert(typeof OSA_CONFIG.validation === 'object', 'validation object exists');
assert(T.anatomical.bmi === 30, 'anatomical BMI threshold is 30');
assert(T.anatomical.neck.male === 17, 'male neck threshold is 17');
assert(T.anatomical.neck.female === 16, 'female neck threshold is 16');
assert(T.loopGain.csr === 10, 'loop gain CSR threshold is 10');
assert(T.deltaHeartRate.dhr === 10, 'delta HR threshold is 10');
assert(T.severity.mild === 5, 'mild AHI cutoff is 5');
assert(T.severity.moderate === 15, 'moderate AHI cutoff is 15');
assert(T.severity.severe === 30, 'severe AHI cutoff is 30');

// ── n() helper ────────────────────────────────────────────────
group('n() Helper');
assertEqual(n(null), null, 'n(null) returns null');
assertEqual(n(undefined), null, 'n(undefined) returns null');
assertEqual(n(''), null, 'n("") returns null');
assertEqual(n('0'), 0, 'n("0") returns 0');
assertEqual(n('29.2'), 29.2, 'n("29.2") returns 29.2');
assertEqual(n('abc'), null, 'n("abc") returns null');
assertEqual(n(42), 42, 'n(42) returns 42');

// ── exists() helper ───────────────────────────────────────────
group('exists() Helper');
assertEqual(exists(null), false, 'exists(null) is false');
assertEqual(exists(undefined), false, 'exists(undefined) is false');
assertEqual(exists(''), false, 'exists("") is false');
assertEqual(exists(0), true, 'exists(0) is true');
assertEqual(exists(42), true, 'exists(42) is true');

group('Shared Report Helpers');
assert(typeof OSAReportShared === 'object', 'OSAReportShared exists');
assert(typeof OSAReportShared.buildCarePathway === 'function', 'buildCarePathway helper exists');
assert(typeof OSAReportShared.detectUARS === 'function', 'detectUARS helper exists');

let sharedUars = OSAReportShared.detectUARS({ ahi: 3, rdi: 12, arInd: 8, ess: 12, isi: 4 });
assert(sharedUars.isUARS, 'Shared UARS helper detects symptomatic normal-AHI patient with elevated RDI');
assert(sharedUars.rdiElevated, 'Shared UARS helper flags elevated RDI pattern');

sharedUars = OSAReportShared.detectUARS({ ahi: 8, rdi: 20, arInd: 20, ess: 14, isi: 10 });
assert(!sharedUars.isUARS, 'Shared UARS helper suppresses UARS once AHI reaches OSA range');

const patientPathway = OSAReportShared.buildCarePathway({
  milestones: ['Initial Eval', 'Study Ordered', 'Study Reviewed', 'CPAP Trial'],
  studyType: 'watchpat',
  hasStudyData: true,
  hasPatientContext: true,
  labels: {
    eval: 'Your Evaluation',
    study: { psg: 'Lab Sleep Study', watchpat: 'Home Sleep Test', default: 'Sleep Study' },
    cpap: { trial: 'Starting CPAP', followup: 'CPAP Check-in', ongoing: 'Ongoing Care' },
    surgical: { planning: 'Planning', dise: 'DISE', surgery: 'Procedure', postop: 'Recovery', efficacy: 'Follow-up Study' },
    mad: { referral: 'Oral Appliance Referral', followup: 'Follow-up', efficacy: 'Follow-up Study' },
    generic: { planning: 'Next Steps', treatment: 'Your Treatment' }
  }
});
assertEqual(patientPathway.detectedPath, 'cpap', 'Shared pathway helper detects CPAP pathway');
assertEqual(patientPathway.stages[1].label, 'Home Sleep Test', 'Shared pathway helper applies study-type-specific label');
assert(patientPathway.currentIdx >= 2, 'Shared pathway helper advances beyond study stage once study data exists');

// ── Validation ────────────────────────────────────────────────
group('Field Validation');
let r;
r = OSAValidation.validateField('age', 61);
assert(r.valid && !r.error && !r.warning, 'age 61 is valid');

r = OSAValidation.validateField('age', 150);
assert(!r.valid, 'age 150 is invalid (max 120)');

r = OSAValidation.validateField('bmi', 65);
assert(r.valid && r.warning, 'bmi 65 is valid but warns (>60)');

r = OSAValidation.validateField('ess', 25);
assert(!r.valid, 'ess 25 is invalid (max 24)');

r = OSAValidation.validateField('nadir', 30);
assert(r.valid && r.warning, 'nadir 30 is valid but warns (<40 warnMin)');

r = OSAValidation.validateField('nadir', 86);
assert(r.valid && !r.warning, 'nadir 86 is valid no warning');

r = OSAValidation.validateField('unknownField', 999);
assert(r.valid, 'unknown field always valid');

r = OSAValidation.validateField('bmi', '');
assert(r.valid, 'blank field is valid (optional)');

group('Form Validation');
const requiredForm = document.createElement('form');
requiredForm.innerHTML = `
  <div><label>Patient name<input name="patientName" required data-label="Patient name"></label></div>
  <div><label>Sex<select name="sex" required data-label="Sex"><option value=""></option><option value="M">Male</option></select></label></div>
`;
document.body.appendChild(requiredForm);
let formValidation = OSAValidation.validateForm(requiredForm);
assertEqual(formValidation.errors.length, 2, 'required empty text/select fields block submission');
requiredForm.querySelector('[name="patientName"]').value = 'Test Patient';
requiredForm.querySelector('[name="sex"]').value = 'M';
formValidation = OSAValidation.validateForm(requiredForm);
assertEqual(formValidation.errors.length, 0, 'required fields clear once populated');
requiredForm.remove();

// ── Anatomical Confidence ─────────────────────────────────────
group('Anatomical Phenotype Confidence');
assertEqual(
  confidenceFor('High Anatomical Contribution', { metrics: { sex: 'M', bmi: 40, neck: 18, tons: 4, mall: 'IV', ahi: 35 } }),
  'High', 'All 5 flags strong → High'
);
assertEqual(
  confidenceFor('High Anatomical Contribution', { metrics: { sex: 'M', bmi: 36, neck: 18, tons: 2, mall: 'II', ahi: 20 } }),
  'Moderate', '2 strong flags → Moderate'
);
assertEqual(
  confidenceFor('High Anatomical Contribution', { metrics: { sex: 'M', bmi: 25, neck: 15, tons: 1, mall: 'I', ahi: 10 } }),
  'Low', '0 strong flags → Low'
);
assertEqual(
  confidenceFor('High Anatomical Contribution', { metrics: { sex: 'F', bmi: 36, neck: 16.5, tons: 3, mall: 'III', ahi: 35 } }),
  'High', 'Female: sex-specific neck threshold (16.5) used'
);

// ── Low Arousal Threshold Confidence ──────────────────────────
group('Low Arousal Threshold Confidence');
assertEqual(
  confidenceFor('Low Arousal Threshold', { metrics: { edwardsArTHScore: 3, edwardsArTHMaxScore: 3 } }),
  'High', 'Edwards score 3/3 → High'
);
assertEqual(
  confidenceFor('Low Arousal Threshold', { metrics: { edwardsArTHScore: 2, edwardsArTHMaxScore: 3 } }),
  'Moderate', 'Edwards score 2/3 → Moderate'
);
assertEqual(
  confidenceFor('Low Arousal Threshold', { metrics: { edwardsArTHScore: 2, edwardsArTHMaxScore: 2 } }),
  'Moderate', 'Edwards score 2/2 → Moderate'
);
assertEqual(
  confidenceFor('Low Arousal Threshold', { metrics: { edwardsArTHScore: 1, edwardsArTHMaxScore: 3 } }),
  'Low', 'Edwards score below threshold → Low'
);

// ── High Loop Gain Confidence ─────────────────────────────────
group('High Loop Gain Confidence');
assertEqual(
  confidenceFor('High Loop Gain', { metrics: { lgEstimate: 0.75, csr: 12, pahic3: 0, pahic4: 0, cai: 0, cvd: false } }),
  'High', 'High loop-gain estimate + supportive signal → High'
);
assertEqual(
  confidenceFor('High Loop Gain', { metrics: { lgEstimate: 0.65, csr: 0, pahic3: 0, pahic4: 0, cai: 0, cvd: true } }),
  'Moderate', 'Borderline estimate + CVD modifier → Moderate'
);
assertEqual(
  confidenceFor('High Loop Gain', { metrics: { csr: 12, pahic3: 10, pahic4: 0, cai: 0, cvd: true } }),
  'High', 'Two supportive signals + CVD → High'
);
assertEqual(
  confidenceFor('High Loop Gain', { metrics: { lgEstimate: 0.55, csr: 0, pahic3: 0, pahic4: 0, cai: 0, cvd: false } }),
  'Low', 'No estimate/support thresholds met → Low'
);

// ── Positional OSA Confidence ─────────────────────────────────
group('Positional OSA Confidence');
assertEqual(
  confidenceFor('Positional OSA', { metrics: { sup: 45, nons: 8 } }),
  'High', 'Ratio 5.6, nonsup 8 (<10) → High'
);
assertEqual(
  confidenceFor('Positional OSA', { metrics: { sup: 22, nons: 0 } }),
  'High', 'Non-supine AHI 0 with persistent supine burden still counts as strong positional signal'
);
assertEqual(
  confidenceFor('Positional OSA', { metrics: { sup: 30, nons: 12 } }),
  'Moderate', 'Ratio 2.5, nonsup 12 (<15) → Moderate'
);
assertEqual(
  confidenceFor('Positional OSA', { metrics: { sup: 20, nons: 18 } }),
  'Low', 'nonsup 18 (>15) → Low'
);

// ── REM-Predominant Confidence ────────────────────────────────
group('REM-Predominant OSA Confidence');
assertEqual(
  confidenceFor('REM-Predominant OSA', { metrics: { remAhi: 35, nremAhi: 8 } }),
  'High', 'Ratio 4.4, NREM 8 (<10) → High'
);
assertEqual(
  confidenceFor('REM-Predominant OSA', { metrics: { remAhi: 18, nremAhi: 0 } }),
  'High', 'NREM AHI 0 with persistent REM burden still counts as strong REM-predominant signal'
);
assertEqual(
  confidenceFor('REM-Predominant OSA', { metrics: { remAhi: 25, nremAhi: 12 } }),
  'Moderate', 'Ratio 2.1, NREM 12 (<15) → Moderate'
);

group('Oxygen Data Sufficiency Guardrails');
assertEqual(
  [null, null, null, null, 86].filter(exists).length >= 2,
  false,
  'A single oxygen metric does not qualify for low-hypoxic-burden framing'
);
assertEqual(
  [null, null, 14, null, 86].filter(exists).length >= 2,
  true,
  'At least two oxygen metrics are required before low-hypoxic-burden framing is allowed'
);

// ── Hypoxic Burden Confidence ─────────────────────────────────
group('Hypoxic Burden Confidence');
assertEqual(
  confidenceFor('High Hypoxic Burden', { metrics: { hbPH: 80, hb90PH: 0, odi: 0, nadir: 90, t90: 0 } }),
  'High', 'HB/hr 80 ≥ 73 → High'
);
assertEqual(
  confidenceFor('High Hypoxic Burden', { metrics: { hbPH: 35, hb90PH: 0, odi: 0, nadir: 90, t90: 0 } }),
  'Moderate', 'HB/hr 35 ≥ 30 → Moderate'
);
assertEqual(
  confidenceFor('High Hypoxic Burden', { metrics: { hbPH: 2, hb90PH: 0.2, odi: 10, nadir: 92, t90: 2 } }),
  'Low', 'All below thresholds → Low'
);
assertEqual(
  confidenceFor('High Hypoxic Burden', { metrics: { hbPH: 0, hb90PH: 0, odi: 55, nadir: 90, t90: 0 } }),
  'High', 'ODI 55 > 50 → High'
);
assertEqual(
  confidenceFor('High Hypoxic Burden', { metrics: { hbPH: 0, hb90PH: 0, odi: 0, nadir: 74, t90: 0 } }),
  'High', 'Nadir 74 < 75 → High'
);

// ── Delta Heart Rate Confidence ───────────────────────────────
group('Delta Heart Rate Confidence');
assertEqual(
  confidenceFor('Elevated Delta Heart Rate', { metrics: { dhr: 20 } }),
  'High', 'ΔHR 20 ≥ 15 → High'
);
assertEqual(
  confidenceFor('Elevated Delta Heart Rate', { metrics: { dhr: 12 } }),
  'Moderate', 'ΔHR 12 ≥ 10 → Moderate'
);
assertEqual(
  confidenceFor('Elevated Delta Heart Rate', { metrics: { dhr: 8 } }),
  'Low', 'ΔHR 8 ≥ 7 (borderline) → Low'
);
assertEqual(
  confidenceFor('Elevated Delta Heart Rate', { metrics: { dhr: 5 } }),
  'Low', 'ΔHR 5 < 7 → Low'
);

// ── Nasal Confidence (NOSE score based) ──────────────────────
group('Nasal-Resistance Confidence');
assertEqual(
  confidenceFor('Nasal-Resistance Contributor', { metrics: { noseScore: 55, ctSeptum: false, ctTurbs: false, nasalObs: false } }),
  'High', 'NOSE 55 ≥ 50 (severe) → High'
);
assertEqual(
  confidenceFor('Nasal-Resistance Contributor', { metrics: { noseScore: 30, ctSeptum: true, ctTurbs: false, nasalObs: false } }),
  'High', 'NOSE 30 + CT septum → High'
);
assertEqual(
  confidenceFor('Nasal-Resistance Contributor', { metrics: { noseScore: 30, ctSeptum: false, ctTurbs: false, nasalObs: false } }),
  'Moderate', 'NOSE 30 ≥ 25 (mild), no CT → Moderate'
);
assertEqual(
  confidenceFor('Nasal-Resistance Contributor', { metrics: { noseScore: 0, ctSeptum: false, ctTurbs: false, nasalObs: true } }),
  'Moderate', 'Patient-reported nasal obs only → Moderate'
);
assertEqual(
  confidenceFor('Nasal-Resistance Contributor', { metrics: { noseScore: 0, ctSeptum: false, ctTurbs: true, nasalObs: false } }),
  'Moderate', 'CT turbinates only → Moderate'
);
assertEqual(
  confidenceFor('Nasal-Resistance Contributor', { metrics: { noseScore: 20, ctSeptum: false, ctTurbs: false, nasalObs: false } }),
  'Low', 'NOSE 20 ≥ 15 (borderline) → Low'
);
assertEqual(
  confidenceFor('Nasal-Resistance Contributor', { metrics: { noseScore: 10, ctSeptum: false, ctTurbs: false, nasalObs: false } }),
  'Low', 'NOSE 10 < 15 → Low'
);

// ── Poor Muscle Responsiveness Confidence ─────────────────────
group('Poor Muscle Responsiveness Confidence');
assertEqual(
  confidenceFor('Poor Muscle Responsiveness', { metrics: { ahi: 35, remAhi: 56, nremAhi: 20 } }),
  'High', 'AHI≥30, ratio 2.8 (>2.5), NREM≥20 → High'
);
assertEqual(
  confidenceFor('Poor Muscle Responsiveness', { metrics: { ahi: 20, remAhi: 50, nremAhi: 20 } }),
  'Moderate', 'ratio 2.5 (>2) but AHI<30 → Moderate'
);

// ── Cross-field validation ────────────────────────────────────
group('Cross-field Validation');
let cw = OSAValidation.validateCrossField({ nonSupPahi: 60, supPahi: 30 });
assert(cw.some(w => w.id === 'nonSup_gt_sup'), 'warns when non-sup > sup pAHI');

cw = OSAValidation.validateCrossField({ nonSupPahi: 20, supPahi: 50 });
assert(!cw.some(w => w.id === 'nonSup_gt_sup'), 'no warning when sup > non-sup');

cw = OSAValidation.validateCrossField({ nonSupPahi: null, supPahi: 50 });
assert(!cw.some(w => w.id === 'nonSup_gt_sup'), 'no warning when field missing');

// ── Sample WatchPAT report values ─────────────────────────────
group('Sample Report Phenotype Detection');

// Using the sample report values: pAHI 29.2, supine 52.9, non-supine 22.1,
// REM 45.8, NREM 24.1, nadir 86, HB/hr 37, BMI 39.8, neck 17.5
// Expected phenotype signals: High Anatomical, High Hypoxic Burden, Nasal

const sampleMetrics = {
  sex: 'M', bmi: 39.8, neck: 17.5, tons: 2, mall: 'III', ahi: 29.2,
  arInd: null, isi: 18, ess: 14, csr: 0, cvd: true,
  remAhi: 45.8, nremAhi: 24.1, sup: 52.9, nons: 22.1,
  odi: 14.8, nadir: 86, hbPH: 37, hb90PH: 1,
  noseScore: 40, nasalObs: false, ctSeptum: true, ctTurbs: false,
  pahic3: 0.9, pahic4: 0.2
};

// Anatomical: BMI≥30, neck≥17, FTP III → 3 of 5 → triggers
const anatFlags = [
  sampleMetrics.bmi >= T.anatomical.bmi,
  sampleMetrics.neck >= T.anatomical.neck.male,
  sampleMetrics.tons >= T.anatomical.tonsils,
  T.anatomical.ftp.includes(sampleMetrics.mall),
  sampleMetrics.ahi >= T.anatomical.ahiSevere
].filter(Boolean).length;
assertEqual(anatFlags, 3, 'Sample: 3 anatomical flags (BMI, neck, FTP)');
assert(anatFlags >= T.anatomical.minCriteria, 'Sample: triggers High Anatomical');

assertEqual(
  confidenceFor('Low Arousal Threshold', { metrics: sampleMetrics }),
  'Low', 'Sample: Low ArTH remains low without Edwards score inputs'
);

// High Loop Gain: CSR 0, pAHIc3 0.9, pAHIc4 0.2 — should NOT trigger (CVD no longer standalone)
const hlgTrigger = (sampleMetrics.csr >= T.loopGain.csr) ||
  (sampleMetrics.pahic3 >= T.loopGain.pahic3) ||
  (sampleMetrics.pahic4 >= T.loopGain.pahic4);
assert(!hlgTrigger, 'Sample: HLG does NOT trigger (CVD alone no longer sufficient)');

// Positional: 52.9/22.1 = 2.39 > 2, nonsup 22.1 > 15 → does NOT trigger
const posRatio = sampleMetrics.sup / sampleMetrics.nons;
const posTrigger = posRatio > T.positional.supNonSupRatio && sampleMetrics.nons < T.positional.nonSupMax;
assert(!posTrigger, 'Sample: Positional does NOT trigger (non-sup 22.1 > 15)');

// Hypoxic Burden: HB/hr 37 ≥ 5 → triggers
assert(sampleMetrics.hbPH >= T.hypoxicBurden.hbPerHour, 'Sample: triggers High Hypoxic Burden (HB/hr 37)');

// Nasal: NOSE 40 ≥ 25 + CT septum → triggers
const nasalTrigger = (sampleMetrics.noseScore >= T.nasal.noseMild) || sampleMetrics.nasalObs || sampleMetrics.ctSeptum || sampleMetrics.ctTurbs;
assert(nasalTrigger, 'Sample: triggers Nasal-Resistance (NOSE 40 + CT septum)');

// ── NOSE Score Config ────────────────────────────────────────────
group('NOSE Score Thresholds');
assertEqual(T.nasal.noseBorderline, 15, 'NOSE borderline threshold is 15');
assertEqual(T.nasal.noseMild, 25, 'NOSE mild threshold is 25');
assertEqual(T.nasal.noseSevere, 50, 'NOSE severe threshold is 50');

// ── Questionnaire Score Computation ──────────────────────────────
group('Questionnaire Score Computation');
// ESS: 8 items, 0-3 each, range 0-24
const essItems = [3, 3, 3, 2, 3, 0, 3, 1]; // from the sample PDF
assertEqual(essItems.reduce((s,v) => s+v, 0), 18, 'ESS sum: 3+3+3+2+3+0+3+1 = 18');
assertEqual(essItems.length, 8, 'ESS has 8 items');
assert(essItems.every(v => v >= 0 && v <= 3), 'All ESS items in 0-3 range');

// ISI: 7 items, 0-4 each, range 0-28
const isiItems = [2, 3, 1, 3, 2, 1, 2]; // sample values
const isiTotal = isiItems.reduce((s,v) => s+v, 0);
assertEqual(isiTotal, 14, 'ISI sum: 2+3+1+3+2+1+2 = 14');
assertEqual(isiItems.length, 7, 'ISI has 7 items');
assert(isiItems.every(v => v >= 0 && v <= 4), 'All ISI items in 0-4 range');

// NOSE: 5 items, 0-4 each, ×5 = 0-100
const noseItems = [3, 2, 3, 1, 2]; // sample values
const noseRaw = noseItems.reduce((s,v) => s+v, 0);
assertEqual(noseRaw, 11, 'NOSE raw sum: 3+2+3+1+2 = 11');
assertEqual(noseRaw * 5, 55, 'NOSE total: 11 × 5 = 55');
assertEqual(noseItems.length, 5, 'NOSE has 5 items');
assert(noseItems.every(v => v >= 0 && v <= 4), 'All NOSE items in 0-4 range');

// Edge cases
assertEqual([0,0,0,0,0,0,0,0].reduce((s,v) => s+v, 0), 0, 'ESS all zeros = 0');
assertEqual([3,3,3,3,3,3,3,3].reduce((s,v) => s+v, 0), 24, 'ESS all threes = 24');
assertEqual([4,4,4,4,4].reduce((s,v) => s+v, 0) * 5, 100, 'NOSE all fours = 100');

// Validation range
assert(OSA_CONFIG.validation.ranges.noseScore.min === 0, 'NOSE validation min is 0');
assert(OSA_CONFIG.validation.ranges.noseScore.max === 100, 'NOSE validation max is 100');

const out = document.getElementById('results');

results.forEach(r => {

    html += `<h3>${r.group}</h3>`;

    const icon = r.pass ? '&#x2713;' : '&#x2717;';

});
