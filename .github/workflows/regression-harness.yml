name: Regression Harness

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  browser-harness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run headless regression suite
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          chmod +x tests/run-headless-suite.sh
          tests/run-headless-suite.sh
