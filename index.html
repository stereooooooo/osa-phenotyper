<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OSA Phenotyper • MVP</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<style>
  body { background:#f6f7fb; }
  .badge-soft { background:#eef2f7; color:#334155; }
  .card { border-radius: 16px; }
  .section-title{ font-weight:600; color:#334155; }
  .kv { font-variant-numeric: tabular-nums; }
  .header-controls > * { margin-left: .5rem; }

  @media print {
    body * { visibility: hidden !important; }

    body.print-patient #patientSummary,
    body.print-patient #patientSummary * { visibility: visible !important; }
    body.print-patient #patientSummary { position: absolute; inset: 0; padding: 1rem; }

    body.print-clinician #patientSummary,
    body.print-clinician #clinician,
    body.print-clinician #patientSummary *,
    body.print-clinician #clinician * { visibility: visible !important; }
    body.print-clinician #patientSummary { position: absolute; top: 0; left: 0; right: 0; padding: 1rem; }
    body.print-clinician #clinician { position: absolute; left: 0; right: 0; top: 55%; padding: 1rem; }

    .no-print { display: none !important; }
  }
  .handout { background:#fff; padding: 1.25rem; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .handout .brand-row { display:flex; align-items:center; gap:1rem; margin-bottom: .75rem; }
  .handout-logo { width: 220px; height: auto; }
  .handout h1 { font-size: 1.5rem; margin: 0; color:#1b3a57; font-weight:700; }
  .handout h2 { font-size: 1.125rem; color:#1b3a57; margin-top:1rem; font-weight:700; }
  .handout p, .handout li { font-size: 0.98rem; line-height: 1.55; color:#374151; }
  .kpi-table { width:100%; border-collapse: collapse; font-size:.95rem; }
  .kpi-table th, .kpi-table td { padding:.5rem .6rem; border-top:1px solid #e5e7eb; vertical-align: top; }
  .muted { color:#6b7280; }
  .chip { display:inline-block; background:#eef2f7; color:#334155; border-radius:999px; padding:.15rem .5rem; font-size:.8rem; margin-left:.35rem; }

</style>
</head>
<body>
  <header class="navbar navbar-expand-lg sticky-top shadow-sm" style="background:#354A5F;">
    <div class="container-fluid">
      <span class="navbar-brand text-white fw-semibold">OSA Phenotyper – MVP</span>
      <div class="d-flex align-items-center header-controls no-print">
        <button class="btn btn-outline-light btn-sm" id="btnPrintPatient" title="Print patient handout">Print patient</button>
        <button class="btn btn-outline-light btn-sm" id="btnPrintClinician" title="Print clinician copy">Print clinician</button>
        <select id="demoSelect" class="form-select form-select-sm w-auto" title="Fill demo case">
          <option value="modHighHB">Demo: Positional + High HB</option>
          <option value="mildLowHB">Demo: Mild OSA + Low HB</option>
          <option value="severeHNS">Demo: Severe OSA (HNS screen)</option>
        </select>
        <button class="btn btn-outline-light btn-sm" type="button" id="btnFill" title="Fill demo data">Fill demo</button>
      </div>
    </div>
  </header>

  <main class="container my-4">
    <p class="text-muted">Minimal inputs → fast phenotype + top‑3 treatment guidance. You can expand later.</p>

    <form id="form" class="row g-4">
      <!-- LEFT: Questionnaires + Exam -->
      <div class="col-lg-5">
        <div class="card shadow-sm">
          <div class="card-header bg-secondary text-white"><i class="bi bi-question-circle"></i> Questionnaires</div>
          <div class="card-body row g-3">
            <div class="col-6">
              <label class="form-label">Epworth (ESS)</label>
              <input type="number" class="form-control" name="ess" min="0" max="24" />
            </div>
            <div class="col-6">
              <label class="form-label">Insomnia Severity (ISI)</label>
              <input type="number" class="form-control" name="isi" min="0" max="28" />
            </div>
            <div class="col-12">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="cvd" name="cvd" />
                <label class="form-check-label" for="cvd">Cardiovascular disease (HTN/CAD/HF/AF)</label>
              </div>
            </div>
          </div>
        </div>

        <div class="card shadow-sm mt-4">
          <div class="card-header bg-secondary text-white"><i class="bi bi-clipboard-pulse"></i> Physical Exam</div>
          <div class="card-body row g-3">
            <div class="col-6"><label class="form-label">BMI</label><input type="number" step="0.1" class="form-control" name="bmi" /></div>
            <div class="col-6"><label class="form-label">Neck (in)</label><input type="number" step="0.1" class="form-control" name="neck" /></div>
            <div class="col-4"><label class="form-label">Tonsils</label><select class="form-select" name="tonsils"><option>0</option><option>1</option><option>2</option><option>3</option><option>4</option></select></div>
            <div class="col-4"><label class="form-label">FTP</label><select class="form-select" name="ftp"><option>I</option><option>II</option><option>III</option><option>IV</option></select></div>
            <div class="col-4"><label class="form-label">Nasal Obs.</label><select class="form-select" name="nasal"><option>None</option><option>Septum</option><option>Turbinates</option><option>Rhinitis</option><option>≥2 issues</option></select></div>
          </div>
        </div>
      </div>

      <!-- RIGHT: Sleep Study -->
      <div class="col-lg-7">
        <div class="card shadow-sm">
          <div class="card-header bg-secondary text-white"><i class="bi bi-activity"></i> Sleep Study (WatchPAT or PSG)</div>
          <div class="card-body row g-3">
            <div class="col-4"><label class="form-label">AHI overall</label><input type="number" step="0.1" name="ahi" class="form-control" /></div>
            <div class="col-4"><label class="form-label">AHI supine</label><input type="number" step="0.1" name="ahiSup" class="form-control" /></div>
            <div class="col-4"><label class="form-label">AHI non‑supine</label><input type="number" step="0.1" name="ahiNonSup" class="form-control" /></div>
            <div class="col-4"><label class="form-label">AHI REM</label><input type="number" step="0.1" name="ahiREM" class="form-control" /></div>
            <div class="col-4"><label class="form-label">AHI NREM</label><input type="number" step="0.1" name="ahiNREM" class="form-control" /></div>
            <div class="col-4"><label class="form-label">ODI 4%</label><input type="number" step="0.1" name="odi" class="form-control" /></div>
            <div class="col-4"><label class="form-label">Min SpO₂ (%)</label><input type="number" step="0.1" name="nadir" class="form-control" /></div>
            <div class="col-4"><label class="form-label">HB / hr</label><input type="number" step="0.1" name="hbPH" class="form-control" /></div>
            <div class="col-4"><label class="form-label">Area &lt; 90% / hr</label><input type="number" step="0.1" name="hb90PH" class="form-control" /></div>
            <div class="col-4"><label class="form-label">% CSR</label><input type="number" step="0.1" name="csr" class="form-control" /></div>
            <div class="col-4"><label class="form-label">pAHIc 3%</label><input type="number" step="0.1" name="pahic3" class="form-control" /></div>
            <div class="col-4"><label class="form-label">pAHIc 4%</label><input type="number" step="0.1" name="pahic4" class="form-control" /></div>
          </div>
        </div>
      </div>

      <div class="col-12 text-center">
        <button class="btn btn-primary px-5" type="submit"><i class="bi bi-bar-chart"></i> Generate</button>
        <button class="btn btn-outline-secondary ms-2" type="button" id="btnReset"><i class="bi bi-person-plus"></i> New patient</button>
      </div>
    </form>

    <hr class="my-4" />

    <div id="patientSummary"></div>
    <div id="clinician"></div>
  </main>

  <script>
    const n = v => (v===null||v===undefined||v===''?null:+v);
    function exists(v){ return v!==null && v!==undefined && v!==''; }

    function conf(tag, m){
      switch(tag){
        case 'High Anatomical Contribution':{
          const strong = ((m.bmi||0)>=30) + ((m.neck||0)>=17) + ((m.tons||0)>=3) + (['III','IV'].includes(m.ftp)?1:0) + ((m.ahi||0)>=30);
          return strong>=4?'High':strong>=2?'Moderate':'Low';
        }
        case 'Low Arousal Threshold':{
          const ar = (m.isi||0);
          const arRatio = (m.arInd && m.ahi)?(m.arInd/m.ahi):0;
          if(ar>=15 || arRatio>1.3) return (ar>=22||arRatio>=1.8)?'High':'Moderate';
          return 'Low';
        }
        case 'High Loop Gain':{
          if((m.csr||0)>=10 || (m.pahic3||0)>=10 || (m.pahic4||0)>=5 || m.cvd) return 'Moderate';
          return 'Low';
        }
        case 'Positional OSA':{
          const pr = (m.sup && m.nons)?(m.sup/m.nons):0;
          if(pr>=3 && (m.nons||0)<10) return 'High';
          if(pr>=2 && (m.nons||0)<15) return 'Moderate';
          return 'Low';
        }
        case 'REM-Predominant OSA':{
          const rr = (m.rem && m.nrem)?(m.rem/m.nrem):0;
          if(rr>=3 && (m.nrem||0)<10) return 'High';
          if(rr>=2 && (m.nrem||0)<15) return 'Moderate';
          return 'Low';
        }
        case 'High Hypoxic Burden':{
          // Evidence-aligned bands: High >=60; Moderate 30-59; include alternates
          const hb=m.hbPH||0, hb90=m.hb90PH||0, odi=m.odi||0, nadir=(m.nadir??100);
          if(hb>=60 || hb90>=3 || odi>=50 || nadir<80) return 'High';
          if(hb>=30 || hb90>=1.5 || (nadir<85 && nadir>=80) || (odi>=30 && odi<50)) return 'Moderate';
          return 'Low';
        }
        case 'Nasal-Resistance Contributor':{
          const f = m.nasal;
          if(f==='≥2 issues') return 'High';
          if(['Septum','Turbinates','Rhinitis'].includes(f)) return 'Moderate';
          return 'Low';
        }
        default: return 'Low';
      }
    }

    function onSubmit(e){
      e.preventDefault();
      const f = new FormData(e.target);

      const m = {
        ess: n(f.get('ess')), isi: n(f.get('isi')), cvd: f.get('cvd')==='on',
        bmi: n(f.get('bmi')), neck: n(f.get('neck')), tons: n(f.get('tonsils')), ftp: f.get('ftp'), nasal: f.get('nasal'),
        ahi: n(f.get('ahi')), sup: n(f.get('ahiSup')), nons: n(f.get('ahiNonSup'))||1, rem: n(f.get('ahiREM')), nrem: n(f.get('ahiNREM')),
        odi: n(f.get('odi')), nadir: n(f.get('nadir')), hbPH: n(f.get('hbPH')), hb90PH: n(f.get('hb90PH')),
        csr: n(f.get('csr')), pahic3: n(f.get('pahic3')), pahic4: n(f.get('pahic4')),
        arInd: n(f.get('arInd'))
      };

      // --- Surgical candidacy helpers (simple rules) ---
      const tonsilGrade = +m.tons || 0;          // 0–4
      const friedman = m.ftp;                    // I–IV
      const bmi = +m.bmi || 0;
      const ahiOverall = +m.ahi || 0;

      const favorableSoftTissue = (tonsilGrade >= 3) && (friedman === 'I' || friedman === 'II');
      const considerSoftTissue = favorableSoftTissue && (ahiOverall >= 5);

      // HNS screen: AHI 15–65, BMI ≤32, and no clear central/CSR signal
      const considerHNS = (ahiOverall >= 15 && ahiOverall <= 65) && (bmi <= 32) && !((m.csr || 0) >= 10) && !((m.pahic4 || 0) >= 5);

      const phen = [];
      const add=(tag, why)=>{ if(!phen.find(p=>p.tag===tag)) phen.push({tag, why, conf:conf(tag,m)}); };

      // ----- phenotype reasons helpers -----
      const reasons = {};
      const addReason = (tag, txt) => { if (!reasons[tag]) reasons[tag] = []; reasons[tag].push(txt); };
      const fmt = (v) => (v==null || v==='') ? '—' : (typeof v === 'number' ? (+v).toFixed(1) : String(v));

      // Core phenotypes + reasons
      if([ (m.bmi||0)>=30, (m.neck||0)>=17, (m.tons||0)>=3, ['III','IV'].includes(m.ftp), (m.ahi||0)>=30 ].filter(Boolean).length>=3) {
        const anaBits = [];
        if ((m.bmi||0) >= 30) anaBits.push(`BMI ${fmt(m.bmi)}`);
        if ((m.neck||0) >= 17) anaBits.push(`Neck ${fmt(m.neck)} in`);
        if ((m.tons||0) >= 3) anaBits.push(`Tonsils ${m.tons}`);
        if (['III','IV'].includes(m.ftp)) anaBits.push(`Friedman ${m.ftp}`);
        if ((m.ahi||0) >= 30) anaBits.push(`AHI ${fmt(m.ahi)}`);
        addReason('High Anatomical Contribution', anaBits.join('; '));
        add('High Anatomical Contribution', []);
      }

      if((m.isi||0)>=15 || ((m.arInd&&m.ahi)&& (m.arInd/m.ahi)>1.3)) {
        const bits = [];
        if ((m.isi||0) >= 15) bits.push(`ISI ${fmt(m.isi)}`);
        if ((m.arInd&&m.ahi) && (m.arInd/m.ahi)>1.3) bits.push(`Arousal index/AHI ${fmt(m.arInd/m.ahi)}`);
        addReason('Low Arousal Threshold', bits.join('; '));
        add('Low Arousal Threshold', []);
      }

      if(((m.csr||0)>=10) || ((m.pahic3||0)>=10) || ((m.pahic4||0)>=5) || m.cvd) {
        const bits = [];
        if ((m.csr||0) >= 10) bits.push(`CSR ${fmt(m.csr)}%`);
        if ((m.pahic3||0) >= 10) bits.push(`pAHIc3 ${fmt(m.pahic3)}/h`);
        if ((m.pahic4||0) >= 5)  bits.push(`pAHIc4 ${fmt(m.pahic4)}/h`);
        if (m.cvd) bits.push('CVD present');
        addReason('High Loop Gain', bits.join('; '));
        add('High Loop Gain', []);
      }

      if((m.sup && m.nons) && ((m.sup/m.nons)>2) && (m.nons<15)) {
        addReason('Positional OSA', `Sup/Non-sup ratio ${fmt(m.sup/m.nons)}; Non-sup AHI ${fmt(m.nons)}`);
        add('Positional OSA', []);
      }

      if((m.rem && m.nrem) && ((m.rem/m.nrem)>2) && (m.nrem<15)) {
        addReason('REM-Predominant OSA', `REM/NREM ratio ${fmt(m.rem/m.nrem)}; NREM AHI ${fmt(m.nrem)}`);
        add('REM-Predominant OSA', []);
      }

      if(((m.hbPH||0)>=30) || ((m.hb90PH||0)>2) || ((m.nadir??100)<85) || ((m.odi||0)>=40)) {
        const bits = [];
        if ((m.hbPH||0)  >= 30) bits.push(`HB/hr ${fmt(m.hbPH)}`);
        if ((m.hbPH||0)  >= 60) bits.push('≥60 (↑ CV risk)');
        if ((m.hb90PH||0)>  2) bits.push(`Area<90/hr ${fmt(m.hb90PH)}`);
        if ((m.odi||0)   >= 40) bits.push(`ODI4 ${fmt(m.odi)}/h`);
        if ((m.nadir??100) < 85) bits.push(`Nadir ${fmt(m.nadir)}%`);
        addReason('High Hypoxic Burden', bits.join('; '));
        add('High Hypoxic Burden', []);
      }

      if(m.nasal && m.nasal!=='None') {
        const nasalMap = { 'Septum':'DNS', 'Turbinates':'ITH', 'Rhinitis':'Rhinitis', '≥2 issues':'DNS + ITH / ≥2' };
        addReason('Nasal-Resistance Contributor', nasalMap[m.nasal] || m.nasal);
        add('Nasal-Resistance Contributor', []);
      }

      // attach reasons into phen objects for display
      phen.forEach(p => { p.why = (reasons[p.tag] || []).join('; '); });

      // Symptom subtype
      let subtype='Minimally‑symptomatic';
      if((m.ess||0)>=15) subtype='Sleepy'; else if((m.isi||0)>=15) subtype='Disturbed‑sleep';

      // Top‑3 recommendations (deduped)
      const rec=[]; const seen=new Set();
      const push=(x)=>{ if(seen.has(x)) return; seen.add(x); rec.push(x); };

      // universal trio
      push('Start CPAP/APAP (gold‑standard).');
      push('Custom oral appliance (MAD) if CPAP fails/intolerant.');
      push('If anatomic contributor is high: discuss surgical options (nasal/soft tissue/HNS).');

      // phenotype‑specific nudges
      if(phen.some(p=>p.tag==='Positional OSA')) push('Begin positional therapy for 2–4 weeks; verify on follow‑up test.');
      if(phen.some(p=>p.tag==='High Loop Gain')) push('If TECSA persists: consider O₂ or acetazolamide; ASV only if LVEF >45%.');
      if(phen.some(p=>p.tag==='Low Arousal Threshold')) push('Add CBT‑I and optimize CPAP comfort (humidification, ramp, mask fit).');
      if(phen.some(p=>p.tag==='High Hypoxic Burden')) push('Prioritize timely therapy to reduce desaturation burden and CV risk.');
      if(phen.some(p=>p.tag==='Nasal-Resistance Contributor')) push('Treat anatomic nasal obstruction (saline/steroid first; septoplasty/turbinate reduction if persistent).');

      // anatomy-specific surgery nudges
      if (considerSoftTissue) {
        push('Anatomy favorable for soft tissue surgery: tonsillectomy ± expansion sphincter pharyngoplasty (tonsils 3–4, Friedman I–II).');
      }
      if (considerHNS) {
        push('Evaluate for hypoglossal nerve stimulation (HNS): AHI 15–65, BMI ≤32, minimal central apnea/CSR.');
      }

      // High HB urgent banner (very high burden or severe desaturation)
      const highHBAlert = ((m.hbPH||0) >= 100) || ((m.hb90PH||0) >= 5) || ((m.nadir??100) < 80);
      if(highHBAlert) rec.unshift('⚠ Prioritize therapy initiation — very high hypoxic burden linked to cardiovascular risk.');

      const top3 = rec.slice(0,3);

      // Patient summary
      const explain = {
        'High Anatomical Contribution':'Your airway is relatively narrow/crowded (weight, tongue/tonsils, palate shape).',
        'Low Arousal Threshold':'You wake easily; even small breathing changes disrupt sleep.',
        'High Loop Gain':'Your breathing control is overly sensitive and can over‑correct.',
        'Positional OSA':'Breathing problems occur mainly when you sleep on your back.',
        'REM-Predominant OSA':'Breathing problems occur mainly during dream (REM) sleep.',
        'High Hypoxic Burden':'Your oxygen level spends a lot of time low during sleep, which strains the heart.',
        'Nasal-Resistance Contributor':'Nasal blockage increases airflow resistance and can worsen snoring or CPAP comfort.'
      };

      const phenList = phen.map(p=>`<li><strong>${p.tag}</strong> <span class="badge badge-soft">${p.conf} confidence</span><br><small>${explain[p.tag]||''}</small></li>`).join('');

      const sev = (ahi)=>{ if(ahi==null) return '—'; if(ahi<5)  return 'None'; if(ahi<15) return 'Mild'; if(ahi<30) return 'Moderate'; return 'Severe'; };
      const core = [
        `AHI: <span class=kv>${exists(m.ahi)?m.ahi:'—'}</span> (<strong>${sev(m.ahi)} OSA</strong>)`,
        `REM: <span class=kv>${exists(m.rem)?m.rem:'—'}</span>`,
        `NREM: <span class=kv>${exists(m.nrem)?m.nrem:'—'}</span>`,
        `Sup/Non‑sup: <span class=kv>${(m.sup&&m.nons)?(m.sup/m.nons).toFixed(1):'—'}</span>`,
        `ODI4: <span class=kv>${exists(m.odi)?m.odi:'—'}</span>`,
        `Nadir: <span class=kv>${exists(m.nadir)?m.nadir+'%':'—'}</span>`,
        `HB/hr: <span class=kv>${exists(m.hbPH)?m.hbPH:'—'}</span>`,
        `Area<90/hr: <span class=kv>${exists(m.hb90PH)?m.hb90PH:'—'}</span>`
      ].join(' | ');

      const today = new Date().toLocaleDateString();

// Patient-friendly rewrite of recommendations
const toPatient = (s)=>{
  return s
    .replace('Start CPAP/APAP (gold‑standard).', 'Start CPAP (first‑line treatment).')
    .replace('Custom oral appliance (MAD) if CPAP fails/intolerant.', 'If CPAP is hard to tolerate, consider a custom oral appliance (mandibular advancement device).')
    .replace('If anatomic contributor is high: discuss surgical options (nasal/soft tissue/HNS).', 'If anatomy is a major factor, we will discuss surgical options that fit your exam and sleep study.')
    .replace('Begin positional therapy for 2–4 weeks; verify on follow‑up test.', 'Try side‑sleeping (positional therapy) for 2–4 weeks and repeat testing to confirm improvement.')
    .replace('If TECSA persists: consider O₂ or acetazolamide; ASV only if LVEF >45%.', 'If central events persist, your clinician may consider oxygen or specific therapies after heart evaluation.')
    .replace('Add CBT‑I and optimize CPAP comfort (humidification, ramp, mask fit).', 'Add insomnia care (CBT‑I) and adjust CPAP comfort settings (humidification, ramp, mask fit).')
    .replace('Prioritize timely therapy to reduce desaturation burden and CV risk.', 'Treat promptly to reduce low‑oxygen events and protect your heart.')
    .replace('Treat anatomic nasal obstruction (saline/steroid first; septoplasty/turbinate reduction if persistent).', 'Treat nasal blockage (sprays first; procedures like septoplasty or turbinate reduction if needed).')
    .replace('Anatomy favorable for soft tissue surgery: tonsillectomy ± expansion sphincter pharyngoplasty (tonsils 3–4, Friedman I–II).', 'Your anatomy may suit soft‑tissue surgery (for example, tonsillectomy or soft‑palate procedures).')
    .replace('Evaluate for hypoglossal nerve stimulation (HNS): AHI 15–65, BMI ≤32, minimal central apnea/CSR.', 'You may qualify for hypoglossal nerve stimulation (a pacemaker‑like device for the tongue).');
};
const patientRecs = top3.map(toPatient);

// Build findings list for patient in plain language + why
const findingExplain = {
  'High Anatomical Contribution':'Your airway is relatively narrow/crowded (weight, tongue/tonsils, palate shape) which can narrow breathing space during sleep.',
  'Low Arousal Threshold':'You wake easily; even small breathing changes disrupt sleep and fragment rest.',
  'High Loop Gain':'Your breathing control is extra sensitive and can over‑correct, causing unstable breathing.',
  'Positional OSA':'Breathing problems are worse when sleeping on your back. Side‑sleeping often helps.',
  'REM-Predominant OSA':'Breathing problems are worse during dream (REM) sleep.',
  'High Hypoxic Burden':'Your oxygen spends more time low during sleep; this can strain the heart over time.',
  'Nasal-Resistance Contributor':'Nasal blockage raises airflow resistance and can worsen snoring or CPAP comfort.'
};
const findingsUl = phen.map(p=>`<li><strong>${p.tag}</strong><span class="chip">${p.conf} confidence</span><br><span class="muted">Why: ${p.why||'pattern seen on your exam or study'}</span><br>${findingExplain[p.tag]||''}</li>`).join('');

const handoutHTML = `
  <section class="handout" id="handout">
    <div class="brand-row">
      <img class="handout-logo" alt="Capital ENT & Sinus Center" src="Horizontal Color.svg" />
      <div>
        <h1>Your Personalized Sleep Report</h1>
        <div class="muted">Date: ${today}</div>
      </div>
    </div>

    <h2>Overview</h2>
    <p>You have <strong>${sev(m.ahi)} obstructive sleep apnea</strong>. This report explains your specific pattern of sleep‑disordered breathing and outlines the next steps most likely to help you.</p>

    <h2>Your main findings</h2>
    <ul>${findingsUl || '<li>No specific patterns were flagged based on the current inputs.</li>'}</ul>

    <h2>What this means for you</h2>
    <ol>${patientRecs.map(r=>`<li>${r}</li>`).join('')}</ol>

    <h2>Your key sleep metrics</h2>
    <table class="kpi-table">
      <tbody>
        <tr><th>AHI (overall)</th><td>${exists(m.ahi)?m.ahi:'—'} <span class="muted">(${sev(m.ahi)} OSA)</span></td></tr>
        <tr><th>AHI (REM / NREM)</th><td>${exists(m.rem)?m.rem:'—'} / ${exists(m.nrem)?m.nrem:'—'}</td></tr>
        <tr><th>AHI (supine / non‑supine)</th><td>${exists(m.sup)?m.sup:'—'} / ${exists(m.nons)?m.nons:'—'} <span class="muted">(ratio ${(m.sup&&m.nons)?(m.sup/m.nons).toFixed(1):'—'})</span></td></tr>
        <tr><th>ODI 4%</th><td>${exists(m.odi)?m.odi:'—'} /h</td></tr>
        <tr><th>Oxygen nadir</th><td>${exists(m.nadir)?m.nadir+'%':'—'}</td></tr>
        <tr><th>Hypoxic burden</th><td>${exists(m.hbPH)?m.hbPH:'—'} %·min/h <span class="muted">(higher risk usually ≥60)</span></td></tr>
        <tr><th>Area &lt; 90% SpO₂</th><td>${exists(m.hb90PH)?m.hb90PH:'—'} %·min/h</td></tr>
        <tr><th>BMI / Neck</th><td>${exists(m.bmi)?m.bmi:'—'} / ${exists(m.neck)?m.neck+' in':'—'}</td></tr>
        <tr><th>Tonsils / Friedman</th><td>${exists(m.tons)?m.tons:'—'} / ${exists(m.ftp)?m.ftp:'—'}</td></tr>
        <tr><th>Nasal finding</th><td>${exists(m.nasal)?m.nasal:'—'}</td></tr>
      </tbody>
    </table>

    <h2>Next steps</h2>
    <p>We will review these results together and decide on a plan that fits you best. Bring this report to your follow‑up visit.</p>
  </section>`;

// Inject handout
document.getElementById('patientSummary').innerHTML = handoutHTML;

      // Clinician panel (with WHY column)
      const allRecs = rec.map(x=>`<li>${x}</li>`).join('');
      const rows = phen.map(p=>`<tr><td>${p.tag}</td><td>${p.conf}</td><td>${p.why || ''}</td></tr>`).join('');
      document.getElementById('clinician').innerHTML = `
        <div class="card shadow-sm mt-3">
          <div class="card-body">
            <h2 class="h6 section-title">Clinician Guidance</h2>
            ${phen.length?`<div class="table-responsive"><table class="table table-sm"><thead><tr><th>Phenotype</th><th>Confidence</th><th>Why</th></tr></thead><tbody>${rows}</tbody></table></div>`:''}
            <h6>Ranked plan</h6>
            <ol>${allRecs}</ol>
          </div>
        </div>`;

      window.scrollTo({top: document.getElementById('patientSummary').offsetTop - 80, behavior:'smooth'});
    }

    document.getElementById('form').addEventListener('submit', onSubmit);

    // Dual print buttons
    const printWithMode = (mode)=>{ document.body.classList.add(mode); window.print(); setTimeout(()=>{ document.body.classList.remove(mode); }, 100); };
    document.getElementById('btnPrintPatient').addEventListener('click', ()=>printWithMode('print-patient'));
    document.getElementById('btnPrintClinician').addEventListener('click', ()=>printWithMode('print-clinician'));

    // New patient reset button
    document.getElementById('btnReset').addEventListener('click', ()=>{
      document.getElementById('form').reset();
      document.getElementById('patientSummary').innerHTML = '';
      document.getElementById('clinician').innerHTML = '';
      window.scrollTo({top:0, behavior:'smooth'});
    });

    // ---- Demo filler ----
    const demoCases = {
      modHighHB: {
        ess: 8, isi: 6, cvd: false,
        bmi: 27.8, neck: 16.8, tonsils: 2, ftp: 'II', nasal: 'Rhinitis',
        ahi: 21.0, ahiSup: 45.0, ahiNonSup: 7.0, ahiREM: 14.0, ahiNREM: 9.0,
        odi: 55.0, nadir: 78.0, hbPH: 68.0, hb90PH: 3.8,
        csr: 0.0, pahic3: 2.0, pahic4: 1.0
      },
      mildLowHB: {
        ess: 6, isi: 7, cvd: false,
        bmi: 24.5, neck: 15.5, tonsils: 1, ftp: 'II', nasal: 'None',
        ahi: 11.9, ahiSup: 14.0, ahiNonSup: 12.0, ahiREM: 13.0, ahiNREM: 11.0,
        odi: 12.0, nadir: 90.0, hbPH: 12.0, hb90PH: 0.5,
        csr: 0.0, pahic3: 1.0, pahic4: 0.5
      },
      severeHNS: {
        ess: 10, isi: 10, cvd: false,
        bmi: 29.5, neck: 17.2, tonsils: 0, ftp: 'II', nasal: 'Septum',
        ahi: 34.0, ahiSup: 42.0, ahiNonSup: 18.0, ahiREM: 28.0, ahiNREM: 24.0,
        odi: 42.0, nadir: 83.0, hbPH: 40.0, hb90PH: 2.2,
        csr: 0.0, pahic3: 2.0, pahic4: 1.0
      }
    };

    function setVal(name, value) {
      const el = document.querySelector(`[name="${name}"]`);
      if (!el) return;
      if (el.type === 'checkbox') {
        el.checked = !!value;
      } else {
        el.value = value;
      }
    }

    function fillDemo(caseKey) {
      document.getElementById('form').reset();
      const d = demoCases[caseKey] || demoCases.modHighHB;
      setVal('ess', d.ess); setVal('isi', d.isi); setVal('cvd', d.cvd);
      setVal('bmi', d.bmi); setVal('neck', d.neck); setVal('tonsils', d.tonsils); setVal('ftp', d.ftp); setVal('nasal', d.nasal);
      setVal('ahi', d.ahi); setVal('ahiSup', d.ahiSup); setVal('ahiNonSup', d.ahiNonSup); setVal('ahiREM', d.ahiREM); setVal('ahiNREM', d.ahiNREM);
      setVal('odi', d.odi); setVal('nadir', d.nadir); setVal('hbPH', d.hbPH); setVal('hb90PH', d.hb90PH);
      setVal('csr', d.csr); setVal('pahic3', d.pahic3); setVal('pahic4', d.pahic4);
      // Optionally auto-run: document.getElementById('form').dispatchEvent(new Event('submit',{cancelable:true}));
    }

    document.getElementById('btnFill').addEventListener('click', ()=>{
      const key = document.getElementById('demoSelect').value;
      fillDemo(key);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
