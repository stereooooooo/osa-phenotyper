<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OSA Phenotyper • MVP</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<style>
  body { background:#f6f7fb; }
  .badge-soft { background:#eef2f7; color:#334155; }
  .card { border-radius: 16px; }
  .section-title{ font-weight:600; color:#334155; }
  .kv { font-variant-numeric: tabular-nums; }
  .header-controls > * { margin-left: .5rem; }

  /* Patient handout */
  .handout { background:#fff; padding: 1.25rem; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .handout .brand-row { display:flex; align-items:center; gap:1rem; margin-bottom: .75rem; }
  .handout-logo { width: 220px; height: auto; }
  .handout h1 { font-size: 1.5rem; margin: 0; color:#1b3a57; font-weight:700; }
  .handout h2 { font-size: 1.125rem; color:#1b3a57; margin-top:1rem; font-weight:700; }
  .handout p, .handout li { font-size: 0.98rem; line-height: 1.55; color:#374151; }
  .kpi-table { width:100%; border-collapse: collapse; font-size:.95rem; }
  .kpi-table th, .kpi-table td { padding:.5rem .6rem; border-top:1px solid #e5e7eb; vertical-align: top; }
  .muted { color:#6b7280; }
  .chip { display:inline-block; background:#eef2f7; color:#334155; border-radius:999px; padding:.15rem .5rem; font-size:.8rem; margin-left:.35rem; }

  @media print {
    body * { visibility: hidden !important; }

    body.print-patient #patientSummary,
    body.print-patient #patientSummary * { visibility: visible !important; }
    body.print-patient #patientSummary { position: absolute; inset: 0; padding: 1rem; }

    body.print-clinician #patientSummary,
    body.print-clinician #clinician,
    body.print-clinician #patientSummary *,
    body.print-clinician #clinician * { visibility: visible !important; }
    body.print-clinician #patientSummary { position: absolute; top: 0; left: 0; right: 0; padding: 1rem; }
    body.print-clinician #clinician { position: absolute; left: 0; right: 0; top: 55%; padding: 1rem; }

    .no-print { display: none !important; }
  }
</style>
</head>
<body>
  <header class="navbar navbar-expand-lg sticky-top shadow-sm" style="background:#354A5F;">
    <div class="container-fluid">
      <span class="navbar-brand text-white fw-semibold">OSA Phenotyper – MVP</span>
      <div class="d-flex align-items-center header-controls no-print">
        <button class="btn btn-outline-light btn-sm" id="btnPrintPatient" title="Print patient handout">Print patient</button>
        <button class="btn btn-outline-light btn-sm" id="btnPrintClinician" title="Print clinician copy">Print clinician</button>
        <select id="demoSelect" class="form-select form-select-sm w-auto" title="Fill demo case">
          <option value="modHighHB">Demo: Positional + High HB</option>
          <option value="mildLowHB">Demo: Mild OSA + Low HB</option>
          <option value="severeHNS">Demo: Severe OSA (HNS screen)</option>
        </select>
        <button class="btn btn-outline-light btn-sm" type="button" id="btnFill" title="Fill demo data">Fill demo</button>
      </div>
    </div>
  </header>

  <main class="container my-4">
    <p class="text-muted">Minimal inputs → fast phenotype + top-3 treatment guidance. You can expand later.</p>

    <form id="form" class="row g-4">
      <div class="col-12">
        <div class="card shadow-sm mb-3">
          <div class="card-header bg-secondary text-white">
            <i class="bi bi-person-badge"></i> Patient & Study Info
          </div>
          <div class="card-body row g-3">
            <div class="col-md-4">
              <label class="form-label">Patient name</label>
              <input type="text" class="form-control" name="ptName" />
            </div>
            <div class="col-md-3">
              <label class="form-label">DOB</label>
              <input type="date" class="form-control" name="ptDob" />
            </div>
            <div class="col-md-3">
              <label class="form-label">Study date</label>
              <input type="date" class="form-control" name="studyDate" />
            </div>
            <div class="col-md-2">
              <label class="form-label">Study type</label>
              <select class="form-select" name="studyType">
                <option value="">—</option>
                <option>Home sleep test (WatchPAT)</option>
                <option>Home sleep test (other)</option>
                <option>In-lab PSG</option>
              </select>
            </div>
          </div>
        </div>
      </div>
      <!-- LEFT: Questionnaires + Exam -->
      <div class="col-lg-5">
        <div class="card shadow-sm">
          <div class="card-header bg-secondary text-white"><i class="bi bi-question-circle"></i> Questionnaires</div>
          <div class="card-body row g-3">
            <div class="col-6">
              <label class="form-label">Epworth (ESS)</label>
              <input type="number" class="form-control" name="ess" min="0" max="24" />
            </div>
            <div class="col-6">
              <label class="form-label">Insomnia Severity (ISI)</label>
              <input type="number" class="form-control" name="isi" min="0" max="28" />
            </div>
            <div class="col-12">
              <label class="form-label">NOSE score (0–100)</label>
              <input type="number" class="form-control" name="nose" min="0" max="100" />
            </div>
            <div class="col-12">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="cvd" name="cvd" />
                <label class="form-check-label" for="cvd">Cardiovascular disease (HTN/CAD/HF/AF)</label>
              </div>
            </div>
          </div>
        </div>

        <div class="card shadow-sm mt-4">
          <div class="card-header bg-secondary text-white"><i class="bi bi-clipboard-pulse"></i> Physical Exam</div>
          <div class="card-body row g-3">
            <div class="col-6"><label class="form-label">BMI</label><input type="number" step="0.1" class="form-control" name="bmi" /></div>
            <div class="col-6"><label class="form-label">Neck (in)</label><input type="number" step="0.1" class="form-control" name="neck" /></div>
            <div class="col-4"><label class="form-label">Tonsils</label><select class="form-select" name="tonsils"><option>0</option><option>1</option><option>2</option><option>3</option><option>4</option></select></div>
            <div class="col-4"><label class="form-label">FTP</label><select class="form-select" name="ftp"><option>I</option><option>II</option><option>III</option><option>IV</option></select></div>
            <div class="col-12">
              <label class="form-label d-block">Nasal Obs.</label>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="nasal" id="nasalSeptum" value="Deviated septum">
                <label class="form-check-label" for="nasalSeptum">Deviated septum</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="nasal" id="nasalTurbinates" value="Enlarged turbinates">
                <label class="form-check-label" for="nasalTurbinates">Enlarged turbinates</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="nasal" id="nasalRhinitis" value="Rhinitis">
                <label class="form-check-label" for="nasalRhinitis">Rhinitis</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="nasal" id="nasalSinusitis" value="Sinusitis">
                <label class="form-check-label" for="nasalSinusitis">Sinusitis</label>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- RIGHT: Sleep Study -->
      <div class="col-lg-7">
        <div class="card shadow-sm">
          <div class="card-header bg-secondary text-white"><i class="bi bi-activity"></i> Sleep Study (WatchPAT or PSG)</div>
          <div class="card-body row g-3">
            <div class="col-4"><label class="form-label">AHI overall</label><input type="number" step="0.1" name="ahi" class="form-control" /></div>
            <div class="col-4"><label class="form-label">AHI supine</label><input type="number" step="0.1" name="ahiSup" class="form-control" /></div>
            <div class="col-4"><label class="form-label">AHI non-supine</label><input type="number" step="0.1" name="ahiNonSup" class="form-control" /></div>
            <div class="col-4"><label class="form-label">AHI REM</label><input type="number" step="0.1" name="ahiREM" class="form-control" /></div>
            <div class="col-4"><label class="form-label">AHI NREM</label><input type="number" step="0.1" name="ahiNREM" class="form-control" /></div>
            <div class="col-4"><label class="form-label">ODI 4%</label><input type="number" step="0.1" name="odi" class="form-control" /></div>
            <div class="col-4"><label class="form-label">Min SpO₂ (%)</label><input type="number" step="0.1" name="nadir" class="form-control" /></div>
            <div class="col-4"><label class="form-label">HB / hr</label><input type="number" step="0.1" name="hbPH" class="form-control" /></div>
            <div class="col-4"><label class="form-label">Area &lt; 90% / hr</label><input type="number" step="0.1" name="hb90PH" class="form-control" /></div>
            <div class="col-4"><label class="form-label">% CSR</label><input type="number" step="0.1" name="csr" class="form-control" /></div>
            <div class="col-4"><label class="form-label">pAHIc 3%</label><input type="number" step="0.1" name="pahic3" class="form-control" /></div>
            <div class="col-4"><label class="form-label">pAHIc 4%</label><input type="number" step="0.1" name="pahic4" class="form-control" /></div>
          </div>
        </div>
      </div>

      <div class="col-12 text-center">
        <button class="btn btn-primary px-5" type="submit"><i class="bi bi-bar-chart"></i> Generate</button>
        <button class="btn btn-outline-secondary ms-2" type="button" id="btnReset"><i class="bi bi-person-plus"></i> New patient</button>
      </div>
    </form>

    <hr class="my-4" />

    <div id="patientSummary"></div>
    <div id="clinician"></div>
  </main>

<script>
  const n = v => (v===null||v===undefined||v===''?null:+v);
  const exists = v => v!==null && v!==undefined && v!=='';

  const getNasalIssues = v =>
  Array.isArray(v) ? v : (v ? [v] : []);

  function conf(tag, m){
    switch(tag){
      case 'High Anatomical Contribution':{
        const strong = ((m.bmi||0)>=30) + ((m.neck||0)>=17) + ((m.tons||0)>=3) + (['III','IV'].includes(m.ftp)?1:0) + ((m.ahi||0)>=30);
        return strong>=4?'High':strong>=2?'Moderate':'Low';
      }
      case 'Low Arousal Threshold':{
        const ar = (m.isi||0);
        const arRatio = (m.arInd && m.ahi)?(m.arInd/m.ahi):0;
        if(ar>=15 || arRatio>1.3) return (ar>=22||arRatio>=1.8)?'High':'Moderate';
        return 'Low';
      }
      case 'High Loop Gain':{
        if((m.csr||0)>=10 || (m.pahic3||0)>=10 || (m.pahic4||0)>=5 || m.cvd) return 'Moderate';
        return 'Low';
      }
      case 'Positional OSA':{
        const pr = (m.sup && m.nons)?(m.sup/m.nons):0;
        if(pr>=3 && (m.nons||0)<10) return 'High';
        if(pr>=2 && (m.nons||0)<15) return 'Moderate';
        return 'Low';
      }
      case 'REM-Predominant OSA':{
        const rr = (m.rem && m.nrem)?(m.rem/m.nrem):0;
        if(rr>=3 && (m.nrem||0)<10) return 'High';
        if(rr>=2 && (m.nrem||0)<15) return 'Moderate';
        return 'Low';
      }
      case 'High Hypoxic Burden':{
        const hb=m.hbPH||0, hb90=m.hb90PH||0, odi=m.odi||0, nadir=(m.nadir??100);
        if(hb>=60 || hb90>=3 || odi>=50 || nadir<80) return 'High';
        if(hb>=30 || hb90>=1.5 || (nadir<85 && nadir>=80) || (odi>=30 && odi<50)) return 'Moderate';
        return 'Low';
      }
      case 'Nasal-Resistance Contributor': {
        const issues = getNasalIssues(m.nasal);
        const nose = m.nose || 0;
        const count = issues.length;
      
        if (count >= 2 || nose >= 60) return 'High';
        if (count === 1 || nose >= 30) return 'Moderate';
        return 'Low';
      }
      default: return 'Low';
    }
  }

  const sev = ahi => ahi == null ? '—'
    : ahi < 5  ? 'None'
    : ahi < 15 ? 'Mild'
    : ahi < 30 ? 'Moderate'
    : 'Severe';

  const explainRec = (r, ctx) => {
  const {
    hbConf,
    hasPositional,
    hasRemPred,
    hasInsomnia,
    highLoop,
    anatHigh,
    considerSoftTissue,
    considerHNS
  } = ctx;

  if (r.startsWith('⚠ Prioritize therapy initiation')) {
    return 'Flag that this case is urgent: very high hypoxic burden is tied to cardiovascular risk, so avoid delays in starting effective therapy.';
  }
  if (r.startsWith('Start or continue CPAP/APAP')) {
    return 'Gold-standard first-line therapy for almost all severities unless there is a strong reason to use an alternative.';
  }
  if (r.startsWith('Custom oral appliance (MAD)')) {
    return 'Evidence-based alternative for mild–moderate OSA or CPAP-intolerant patients; plan a follow-up study to confirm response.';
  }
  if (r.startsWith('If anatomic contributor is high: discuss surgical options')) {
    return anatHigh
      ? 'Anatomy is a major driver here; nasal and palatal surgery can support PAP or, in selected patients, provide partial definitive treatment.'
      : 'Use this mainly when the phenotyping suggests a strong anatomic contribution or the patient is highly surgery-leaning.';
  }
  if (r.startsWith('Begin positional therapy')) {
    return hasPositional
      ? 'Supine AHI >> non-supine; a structured positional trial with follow-up testing is reasonable.'
      : 'Reserve for clearly positional patterns (supine AHI ≥2–3× non-supine and non-supine AHI < ~15).';
  }
  if (r.startsWith('If TECSA persists')) {
    return highLoop
      ? 'Loop-gain/central features present – consider this if central apneas persist on PAP and EF is acceptable.'
      : 'Only relevant if a central/complex pattern is documented; ignore otherwise.';
  }
  if (r.startsWith('Add CBT-I and optimize CPAP comfort')) {
    return hasInsomnia
      ? 'COMISA pattern – treating insomnia and PAP comfort in parallel improves adherence and daytime function.'
      : 'Use if patient reports fragmented sleep or PAP intolerance even with lower ISI scores.';
  }
  if (r.startsWith('Prioritize timely therapy to reduce desaturation burden')) {
    return hbConf === 'High'
      ? 'High desaturation burden – emphasize CV and neurocognitive risk reduction when counseling.'
      : 'Useful when ODI/HB are disproportionally high relative to AHI.';
  }
  if (r.startsWith('Treat anatomic nasal obstruction')) {
    return 'NOSE ≥30 and/or structural findings – stepwise nasal management to improve symptoms and PAP tolerance.';
  }
  if (r.startsWith('Anatomy favorable for soft tissue surgery')) {
    return considerSoftTissue
      ? 'Large tonsils + favorable Friedman; reasonable to discuss tonsillectomy ± ESP as anatomic debulking.'
      : 'Only applies when tonsils are 3–4 and Friedman I–II.';
  }
  if (r.startsWith('Evaluate for hypoglossal nerve stimulation')) {
    return considerHNS
      ? 'Meets standard criteria (AHI 15–65, BMI ≤32, minimal centrals); flag for HNS discussion or referral.'
      : 'Will only appear when the usual inclusion criteria are met.';
  }
  return 'Context-dependent; tailor to the patient’s comorbidities, prior therapies, and preferences.';
};
  
  function onSubmit(e){
    e.preventDefault();
    const f = new FormData(e.target);

    const m = {
      ess: n(f.get('ess')), isi: n(f.get('isi')), cvd: f.get('cvd') === 'on',
      bmi: n(f.get('bmi')), neck: n(f.get('neck')), tons: n(f.get('tonsils')), ftp: f.get('ftp'),
      nasal: f.getAll('nasal'),
      ahi: n(f.get('ahi')), sup: n(f.get('ahiSup')), nons: n(f.get('ahiNonSup')) || 1,
      rem: n(f.get('ahiREM')), nrem: n(f.get('ahiNREM')),
      odi: n(f.get('odi')), nadir: n(f.get('nadir')), hbPH: n(f.get('hbPH')), hb90PH: n(f.get('hb90PH')),
      csr: n(f.get('csr')), pahic3: n(f.get('pahic3')), pahic4: n(f.get('pahic4')),
      arInd: n(f.get('arInd')),
      nose: n(f.get('nose')),
      ptName: f.get('ptName') || '',
      ptDob: f.get('ptDob') || '',
      studyDate: f.get('studyDate') || '',
      studyType: f.get('studyType') || ''
    };

    const nasalIssues = getNasalIssues(m.nasal);
    
    // Surgical candidacy helpers
    const tonsilGrade = +m.tons || 0;
    const friedman = m.ftp;
    const bmi = +m.bmi || 0;
    const ahiOverall = +m.ahi || 0;
    const favorableSoftTissue = (tonsilGrade >= 3) && (friedman === 'I' || friedman === 'II');
    const considerSoftTissue = favorableSoftTissue && (ahiOverall >= 5);
    const considerHNS =
      sev(ahiOverall) !== 'Mild' &&      // extra guard against mild OSA
      ahiOverall >= 15 && ahiOverall <= 65 &&
      bmi <= 32 &&
      !((m.csr || 0) >= 10) &&
      !((m.pahic4 || 0) >= 5);

    // Phenotypes + reasons
    const phen = [];
    const reasons = {};
    const add=(tag)=>{ if(!phen.find(p=>p.tag===tag)) phen.push({tag, conf:conf(tag,m)}); };
    const addWhy=(tag,txt)=>{ if(!reasons[tag]) reasons[tag]=[]; reasons[tag].push(txt); };

    if([ (m.bmi||0)>=30, (m.neck||0)>=17, (m.tons||0)>=3, ['III','IV'].includes(m.ftp), (m.ahi||0)>=30 ].filter(Boolean).length>=3){
      const bits=[];
      if ((m.bmi||0) >= 30) bits.push(`BMI ${m.bmi}`);
      if ((m.neck||0) >= 17) bits.push(`Neck ${m.neck} in`);
      if ((m.tons||0) >= 3) bits.push(`Tonsils ${m.tons}`);
      if (['III','IV'].includes(m.ftp)) bits.push(`Friedman ${m.ftp}`);
      if ((m.ahi||0) >= 30) bits.push(`AHI ${m.ahi}`);
      addWhy('High Anatomical Contribution', bits.join('; '));
      add('High Anatomical Contribution');
    }
    if((m.isi||0)>=15 || ((m.arInd&&m.ahi)&& (m.arInd/m.ahi)>1.3)){
      const bits=[];
      if ((m.isi||0) >= 15) bits.push(`ISI ${m.isi}`);
      if ((m.arInd&&m.ahi) && (m.arInd/m.ahi)>1.3) bits.push(`Arousal index/AHI ${(m.arInd/m.ahi).toFixed(1)}`);
      addWhy('Low Arousal Threshold', bits.join('; '));
      add('Low Arousal Threshold');
    }
    if ((m.isi || 0) >= 15) {
      addWhy('Insomnia / COMISA pattern', `ISI ${m.isi} (≥15 suggests clinically significant insomnia symptoms)`);
      add('Insomnia / COMISA pattern');
    }
    if(((m.csr||0)>=10) || ((m.pahic3||0)>=10) || ((m.pahic4||0)>=5) || m.cvd){
      const bits=[];
      if ((m.csr||0) >= 10) bits.push(`CSR ${m.csr}%`);
      if ((m.pahic3||0) >= 10) bits.push(`pAHIc3 ${m.pahic3}/h`);
      if ((m.pahic4||0) >= 5)  bits.push(`pAHIc4 ${m.pahic4}/h`);
      if (m.cvd) bits.push('CVD present');
      addWhy('High Loop Gain', bits.join('; '));
      add('High Loop Gain');
    }
    if((m.sup && m.nons) && ((m.sup/m.nons)>2) && (m.nons<15)){
      addWhy('Positional OSA', `Sup/Non-sup ${(m.sup/m.nons).toFixed(1)}; Non-sup AHI ${m.nons}`);
      add('Positional OSA');
    }
    if((m.rem && m.nrem) && ((m.rem/m.nrem)>2) && (m.nrem<15)){
      addWhy('REM-Predominant OSA', `REM/NREM ${(m.rem/m.nrem).toFixed(1)}; NREM AHI ${m.nrem}`);
      add('REM-Predominant OSA');
    }
    if(((m.hbPH||0)>=30) || ((m.hb90PH||0)>2) || ((m.nadir??100)<85) || ((m.odi||0)>=40)){
      const bits=[];
      if ((m.hbPH||0)  >= 30) bits.push(`HB/hr ${m.hbPH}`);
      if ((m.hbPH||0)  >= 60) bits.push('≥60 (↑ CV risk)');
      if ((m.hb90PH||0)>  2) bits.push(`Area<90/hr ${m.hb90PH}`);
      if ((m.odi||0)   >= 40) bits.push(`ODI4 ${m.odi}/h`);
      if ((m.nadir??100) < 85) bits.push(`Nadir ${m.nadir}%`);
      addWhy('High Hypoxic Burden', bits.join('; '));
      add('High Hypoxic Burden');
    }

    const highNOSE = (m.nose || 0) >= 30;
    if (nasalIssues.length || highNOSE) {
      const bits = [];
      if (nasalIssues.length) bits.push(nasalIssues.join(', '));
      if (exists(m.nose)) bits.push(`NOSE ${m.nose}/100`);
      addWhy('Nasal-Resistance Contributor', bits.join('; '));
      add('Nasal-Resistance Contributor');
    }
    phen.forEach(p=>p.why=(reasons[p.tag]||[]).join('; '));

    // Symptom subtype
    let subtype='Minimally-symptomatic';
    if((m.ess||0)>=15) subtype='Sleepy'; else if((m.isi||0)>=15) subtype='Disturbed-sleep';

    // Ranked recs
    const rec=[]; const seen=new Set();
    const push=(x)=>{ if(seen.has(x)) return; seen.add(x); rec.push(x); };

    push('Start or continue CPAP/APAP (gold-standard).');

    const isMildMod = (ahiOverall >= 5 && ahiOverall < 30);
    if (isMildMod) {
      push('Custom oral appliance (MAD) — best for mild–moderate OSA and for people who cannot tolerate CPAP or prefer not to use it.');
    }
    push('If anatomic contributor is high: discuss surgical options (nasal and soft tissue surgery).');

    if(phen.some(p=>p.tag==='Positional OSA')) push('Begin positional therapy for 2–4 weeks; verify on follow-up test.');
    if(phen.some(p=>p.tag==='High Loop Gain')) push('If TECSA persists: consider O₂ or acetazolamide; ASV only if LVEF >45%.');
    if(phen.some(p=>p.tag==='Low Arousal Threshold')) push('Add CBT-I and optimize CPAP comfort (humidification, ramp, mask fit).');
    if(phen.some(p=>p.tag==='High Hypoxic Burden')) push('Prioritize timely therapy to reduce desaturation burden and CV risk.');
    if(phen.some(p=>p.tag==='Nasal-Resistance Contributor')) push('Treat anatomic nasal obstruction (saline/steroid first; septoplasty/turbinate reduction if persistent).');

    if (considerSoftTissue) {
      push('Anatomy favorable for soft tissue surgery: tonsillectomy ± expansion sphincter pharyngoplasty (tonsils 3–4, Friedman I–II).');
    }
    if (considerHNS) {
      push('Evaluate for hypoglossal nerve stimulation (HNS): AHI 15–65, BMI ≤32, minimal central apnea/CSR.');
    }

    const highHBAlert = ((m.hbPH||0) >= 100) || ((m.hb90PH||0) >= 5) || ((m.nadir??100) < 80);
    if(highHBAlert) rec.unshift('⚠ Prioritize therapy initiation — very high hypoxic burden linked to cardiovascular risk.');

    const top3 = rec.slice(0,3);

    const today = new Date().toLocaleDateString();

    // Build patient-facing "Your main findings" summary for ALL patients
    const patientFindings = [];

    // 1) Overall severity (AHI)
    if (exists(m.ahi)) {
      const s = sev(m.ahi);
      if (s === 'None') {
        patientFindings.push(
          'Your sleep test did not show obstructive sleep apnea based on the main index (AHI).'
        );
      } else {
        const freq =
          s === 'Mild'
            ? 'are present but not extremely frequent.'
            : s === 'Moderate'
            ? 'happen often enough that we recommend active treatment.'
            : 'are frequent and more severe; treatment is strongly recommended.';
        patientFindings.push(
          `Your sleep apnea is in the <strong>${s.toLowerCase()}</strong> range. This means breathing pauses ${freq}`
        );
      }
    }

    // 2) Body position (supine vs non-supine)
    if (exists(m.sup) && exists(m.nons)) {
      if (m.sup > m.nons * 1.5) {
        patientFindings.push(
          'You had many more breathing pauses while sleeping on your back than on your side or stomach, so body position is an important part of your treatment plan.'
        );
      } else if (m.nons > m.sup * 1.5) {
        patientFindings.push(
          'You actually had more breathing pauses when you were not on your back, so simple side-sleeping alone is unlikely to fix the problem.'
        );
      } else {
        patientFindings.push(
          'You had a similar number of breathing pauses on your back and on your side or stomach, so we focus more on other treatments than on body position alone.'
        );
      }
    }

    // 3) Sleep stage (REM vs NREM)
    if (exists(m.rem) && exists(m.nrem)) {
      if (m.rem > m.nrem * 1.5) {
        patientFindings.push(
          'Your breathing problems were worse during dream (REM) sleep, which still carries risk even if you do not feel very sleepy during the day.'
        );
      } else if (m.nrem > m.rem * 1.5) {
        patientFindings.push(
          'Your breathing problems were a bit worse outside of dream (REM) sleep, meaning the pattern is present throughout the night.'
        );
      } else {
        patientFindings.push(
          'Your breathing pattern was similar in dream (REM) and non-dream (NREM) sleep.'
        );
      }
    }

    // 4) Oxygen / hypoxic burden
    const hbConf = conf('High Hypoxic Burden', m);
    if (hbConf === 'High') {
      patientFindings.push(

    } else if (hbConf === 'Moderate') {

  function setVal(name, value) {
    const els = document.querySelectorAll(`[name="${name}"]`);
    if (!els.length) return;
  
    // Single checkbox (e.g., cvd)
    if (els[0].type === 'checkbox' && els.length === 1) {
      els[0].checked = !!value;
      return;
    }
  
    // Multiple checkboxes (e.g., nasal)
    if (els[0].type === 'checkbox') {
      const vals = Array.isArray(value) ? value : (value ? [value] : []);
      els.forEach(el => {
        el.checked = vals.includes(el.value);
